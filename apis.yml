aid: phraseanet
url: https://raw.githubusercontent.com/api-evangelist/phraseanet/refs/heads/main/apis.yml
name: Phraseanet
kind: company
description: Phraseanet is an open-source (GPL-v3) Digital Asset Management (DAM)
  platform built in PHP and developed by Alchemy. It centralizes photos, videos,
  documents, and other media with metadata management (Dublin Core mapping),
  Elasticsearch-powered search, multi-resolution sub-definitions, thesaurus,
  rights administration, stories, baskets, and feeds. Phraseanet exposes a
  documented RESTful API (v1 and v2, with a newer v3 published on SwaggerHub)
  secured with OAuth2, covering records, databoxes and collections, metadata,
  search, stories, baskets, and feeds. Because Phraseanet is self-hosted, there
  is no single public shared API endpoint - the API runs on each organization's
  own Phraseanet instance. Alchemy provides commercial hosting, setup, training,
  and support around the open-source core.
